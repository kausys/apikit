name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - .
          - scanner
          - openapi
          - handler
          - cmd

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Create go.work
        run: go work init . scanner openapi handler cmd

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: ${{ matrix.module }}
          args: --config ${{ matrix.module == '.' && '.golangci.yml' || '../.golangci.yml' }}
